version: '3.8'

services:
  kgen-gallery:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: kgen-gallery
    restart: unless-stopped
    environment:
      - KIE_API_KEY=${KIE_API_KEY:-}
    volumes:
      # Mount site-config.js separately (contains API key, not in git)
      - ./web-ui/site-config.js:/app/web-ui/site-config.js:ro
    labels:
      # Traefik auto-discovery
      - "traefik.enable=true"
      # HTTPS route
      - "traefik.http.routers.kgen.rule=Host(`kgen.cloud`)"
      - "traefik.http.routers.kgen.entrypoints=websecure"
      - "traefik.http.routers.kgen.tls.certresolver=myresolver"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.kgen-http.rule=Host(`kgen.cloud`)"
      - "traefik.http.routers.kgen-http.entrypoints=web"
      - "traefik.http.routers.kgen-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # Service port (Node.js server on 3456)
      - "traefik.http.services.kgen.loadbalancer.server.port=3456"
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true
