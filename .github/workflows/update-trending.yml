name: 🔄 Auto-Update Trending Prompts

on:
  # Run daily at 6:00 AM UTC (1:00 PM Vietnam time)
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Scrape trending prompts
        run: python scripts/scrape_trending.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: 📊 Check for changes
        id: check_changes
        run: |
          git diff --stat
          if git diff --quiet web-ui/data/trending-prompts.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No new prompts found"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            NEW_SIZE=$(wc -c < web-ui/data/trending-prompts.json)
            NEW_COUNT=$(python3 -c "import json; print(len(json.load(open('web-ui/data/trending-prompts.json'))))")
            echo "📊 New prompt count: $NEW_COUNT"
            echo "💾 New file size: $((NEW_SIZE / 1024)) KB"
          fi

      - name: 📤 Commit and push updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          PROMPT_COUNT=$(python3 -c "import json; print(len(json.load(open('web-ui/data/trending-prompts.json'))))")
          DATE=$(date +"%Y-%m-%d")
          
          git add web-ui/data/trending-prompts.json
          git commit -m "🔄 Auto-update: ${PROMPT_COUNT} trending prompts (${DATE})"
          git push

      - name: 📋 Summary
        run: |
          echo "## 📊 Trending Prompts Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            PROMPT_COUNT=$(python3 -c "import json; print(len(json.load(open('web-ui/data/trending-prompts.json'))))")
            echo "✅ **Updated!** ${PROMPT_COUNT} total prompts" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The deploy workflow will auto-trigger to update GitHub Pages." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No new prompts found. Data is up to date." >> $GITHUB_STEP_SUMMARY
          fi
